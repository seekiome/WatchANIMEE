<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WatchTogether</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --accent: #e8ff47;
    --text: #f0f0f8;
    --muted: #6b6b88;
    --border: #2a2a3a;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; overflow-x: hidden; }

  /* LOBBY */
  #lobby { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  #lobby::before { content: ''; position: fixed; top: -30%; left: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(232,255,71,0.06) 0%, transparent 70%); pointer-events: none; }
  .logo { font-size: clamp(2.5rem,6vw,4rem); font-weight: 800; letter-spacing: -2px; margin-bottom: .25rem; }
  .logo span { color: var(--accent); }
  .tagline { color: var(--muted); font-family: 'DM Mono',monospace; font-size: .85rem; margin-bottom: 3rem; letter-spacing: .05em; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px; }
  .tabs { display: flex; gap: .5rem; margin-bottom: 2rem; background: var(--surface2); padding: .35rem; border-radius: 10px; }
  .tab { flex: 1; padding: .65rem; border: none; border-radius: 7px; background: transparent; color: var(--muted); font-family: 'Syne',sans-serif; font-weight: 700; font-size: .9rem; cursor: pointer; transition: all .2s; }
  .tab.active { background: var(--accent); color: #0a0a0f; }
  .input-group { display: flex; flex-direction: column; gap: .75rem; margin-bottom: 1.25rem; }
  label { font-size: .75rem; font-family: 'DM Mono',monospace; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  input[type="text"] { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: .85rem 1rem; color: var(--text); font-family: 'Syne',sans-serif; font-size: 1rem; outline: none; width: 100%; transition: border-color .2s; }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }
  .btn { width: 100%; padding: .95rem; border: none; border-radius: var(--radius); background: var(--accent); color: #0a0a0f; font-family: 'Syne',sans-serif; font-weight: 800; font-size: 1rem; cursor: pointer; transition: all .2s; }
  .btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
  .btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text); margin-top: .5rem; }

  /* APP */
  #app { display: none; height: 100vh; flex-direction: column; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: .85rem 1.5rem; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .topbar-logo { font-weight: 800; font-size: 1.1rem; }
  .topbar-logo span { color: var(--accent); }
  .room-badge { display: flex; align-items: center; gap: .5rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: .4rem .85rem; font-family: 'DM Mono',monospace; font-size: .8rem; }
  .room-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
  .viewers-count { font-family: 'DM Mono',monospace; font-size: .8rem; color: var(--muted); }
  .main-layout { display: flex; flex: 1; overflow: hidden; }
  .video-area { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
  #videoPlayer { width: 100%; flex: 1; object-fit: contain; display: none; background: #000; }

  .upload-zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.25rem; padding: 2rem; cursor: pointer; transition: background .2s; }
  .upload-zone:hover { background: rgba(232,255,71,.03); }
  .upload-icon { width: 80px; height: 80px; border: 2px dashed var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; transition: all .3s; }
  .upload-zone:hover .upload-icon { border-color: var(--accent); color: var(--accent); }
  .upload-text { font-size: 1.1rem; font-weight: 700; }
  .upload-sub { font-family: 'DM Mono',monospace; font-size: .75rem; color: var(--muted); }
  #fileInput { display: none; }

  .waiting-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; color: var(--muted); }
  .waiting-spinner { width: 40px; height: 40px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* P2P status bar */
  .p2p-status { position: absolute; top: 1rem; left: 50%; transform: translateX(-50%); background: rgba(10,10,15,.85); border: 1px solid var(--border); border-radius: 20px; padding: .4rem 1rem; font-family: 'DM Mono',monospace; font-size: .75rem; color: var(--muted); display: none; gap: .5rem; align-items: center; backdrop-filter: blur(8px); z-index: 10; }
  .p2p-status.show { display: flex; }
  .p2p-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

  .controls { display: flex; align-items: center; gap: 1rem; padding: .85rem 1.25rem; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
  .ctrl-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.1rem; transition: all .15s; flex-shrink: 0; }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ctrl-btn.accent { background: var(--accent); border-color: var(--accent); color: #0a0a0f; }
  .progress-wrap { flex: 1; display: flex; flex-direction: column; gap: .3rem; }
  .progress { width: 100%; height: 4px; -webkit-appearance: none; appearance: none; background: var(--border); border-radius: 2px; cursor: pointer; outline: none; }
  .progress::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; }
  .time-label { font-family: 'DM Mono',monospace; font-size: .7rem; color: var(--muted); }
  .vol-wrap { display: flex; align-items: center; gap: .5rem; flex-shrink: 0; }
  .vol-slider { width: 80px; height: 3px; -webkit-appearance: none; background: var(--border); border-radius: 2px; outline: none; cursor: pointer; }
  .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--text); cursor: pointer; }

  /* SIDEBAR */
  .sidebar { width: 300px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); font-size: .75rem; font-family: 'DM Mono',monospace; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  .messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: .6rem; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .msg { display: flex; flex-direction: column; gap: .15rem; }
  .msg-author { font-size: .7rem; font-family: 'DM Mono',monospace; color: var(--accent); }
  .msg-system .msg-author { color: var(--muted); font-style: italic; }
  .msg-text { font-size: .88rem; line-height: 1.45; word-break: break-word; background: var(--surface2); padding: .5rem .75rem; border-radius: 0 10px 10px 10px; }
  .msg-system .msg-text { background: transparent; color: var(--muted); padding: .25rem 0; font-family: 'DM Mono',monospace; font-size: .75rem; }
  .chat-input-wrap { padding: .85rem; border-top: 1px solid var(--border); display: flex; gap: .5rem; }
  .chat-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: .6rem .85rem; color: var(--text); font-family: 'Syne',sans-serif; font-size: .88rem; outline: none; }
  .chat-input:focus { border-color: var(--accent); }
  .send-btn { background: var(--accent); border: none; border-radius: 8px; width: 38px; color: #0a0a0f; font-size: 1rem; cursor: pointer; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; width: 90%; max-width: 420px; }
  .modal-title { font-size: 1.2rem; font-weight: 800; margin-bottom: .5rem; }
  .modal-sub { color: var(--muted); font-size: .85rem; margin-bottom: 1.5rem; }
  .copy-row { display: flex; gap: .5rem; margin-bottom: 1rem; }
  .copy-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: .65rem .85rem; color: var(--text); font-family: 'DM Mono',monospace; font-size: .78rem; outline: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .copy-btn { background: var(--accent); border: none; border-radius: 8px; padding: 0 1rem; color: #0a0a0f; font-family: 'Syne',sans-serif; font-weight: 700; font-size: .85rem; cursor: pointer; white-space: nowrap; }

  @media(max-width:700px){ .sidebar{display:none} }
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="logo">Watch<span>Together</span></div>
  <div class="tagline">// синхронный просмотр · P2P</div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('host')">Хост</button>
      <button class="tab" onclick="switchTab('join')">Войти</button>
    </div>
    <div id="hostTab">
      <div class="input-group">
        <label>Твоё имя</label>
        <input type="text" id="hostName" placeholder="Имя..." maxlength="24">
      </div>
      <button class="btn" onclick="createRoom()">Создать комнату →</button>
    </div>
    <div id="joinTab" style="display:none">
      <div class="input-group">
        <label>Твоё имя</label>
        <input type="text" id="joinName" placeholder="Имя..." maxlength="24">
      </div>
      <div class="input-group">
        <label>Код комнаты</label>
        <input type="text" id="joinCode" placeholder="XXXX" maxlength="8" style="text-transform:uppercase;letter-spacing:.1em;font-family:'DM Mono',monospace">
      </div>
      <button class="btn" onclick="joinRoom()">Войти →</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">Watch<span>Together</span></div>
    <div class="room-badge"><div class="dot"></div><span id="roomCodeDisplay">----</span></div>
    <div style="display:flex;align-items:center;gap:1rem;">
      <span class="viewers-count" id="viewersCount">👁 1</span>
      <button class="ctrl-btn" onclick="openShare()" title="Пригласить">🔗</button>
    </div>
  </div>

  <div class="main-layout">
    <div class="video-area">
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()" style="display:none">
        <div class="upload-icon">📁</div>
        <div class="upload-text">Выбрать видео</div>
        <div class="upload-sub">MP4, MKV, AVI, MOV, WebM — без лимита размера</div>
        <input type="file" id="fileInput" accept="video/*" onchange="selectVideo(this)">
      </div>

      <div class="waiting-screen" id="waitingScreen" style="display:none">
        <div class="waiting-spinner"></div>
        <div style="font-size:.9rem;color:var(--muted)" id="waitingText">Ожидание видео от хоста…</div>
      </div>

      <video id="videoPlayer" controls></video>

      <!-- P2P status -->
      <div class="p2p-status" id="p2pStatus">
        <div class="p2p-dot"></div>
        <span id="p2pStatusText">P2P соединение…</span>
      </div>

      <div class="controls" id="controls" style="display:none">
        <button class="ctrl-btn accent" id="playPauseBtn" onclick="togglePlay()">▶</button>
        <div class="progress-wrap">
          <input type="range" class="progress" id="progressBar" value="0" min="0" max="100" step="0.1" oninput="seekVideo(this.value)">
          <div class="time-label" id="timeLabel">0:00 / 0:00</div>
        </div>
        <div class="vol-wrap">
          <span style="font-size:.9rem">🔊</span>
          <input type="range" class="vol-slider" min="0" max="1" step="0.02" value="1" oninput="setVolume(this.value)">
        </div>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-header">Чат</div>
      <div class="messages" id="messages"></div>
      <div class="chat-input-wrap">
        <input type="text" class="chat-input" id="chatInput" placeholder="Написать..." maxlength="300" onkeydown="if(event.key==='Enter')sendChat()">
        <button class="send-btn" onclick="sendChat()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- Share modal -->
<div class="modal-overlay" id="shareModal" onclick="if(event.target===this)closeShare()">
  <div class="modal">
    <div class="modal-title">Пригласить друзей</div>
    <div class="modal-sub">Отправь ссылку — видео придёт напрямую через P2P</div>
    <div class="copy-row">
      <input type="text" class="copy-input" id="shareLink" readonly>
      <button class="copy-btn" onclick="copyLink()">Копировать</button>
    </div>
    <div style="text-align:center;font-family:'DM Mono',monospace;font-size:.8rem;color:var(--muted);margin-bottom:1rem">или код комнаты</div>
    <div style="text-align:center;font-size:2.5rem;font-weight:800;letter-spacing:.2em;" id="shareCode">----</div>
    <button class="btn secondary" onclick="closeShare()" style="margin-top:1.5rem">Закрыть</button>
  </div>
</div>

<script>
// ── STATE ──
let ws, roomId, myName, myClientId, isHost = false;
let isSyncing = false;
let localFile = null;

// WebRTC peers: Map<clientId, RTCPeerConnection>
const peers = new Map();

const ICE_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' }
];

// ── UTILS ──
function randomId(len=6){ return Math.random().toString(36).substr(2,len).toUpperCase(); }
function formatTime(s){ s=Math.floor(s||0); const m=Math.floor(s/60),sec=s%60; return `${m}:${sec.toString().padStart(2,'0')}`; }
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(tab==='host'&&i===0)||(tab==='join'&&i===1)));
  document.getElementById('hostTab').style.display=tab==='host'?'block':'none';
  document.getElementById('joinTab').style.display=tab==='join'?'block':'none';
}

window.addEventListener('load',()=>{
  const p=new URLSearchParams(location.search);
  if(p.get('room')){ document.getElementById('joinCode').value=p.get('room'); switchTab('join'); }
});

// ── LOBBY ──
function createRoom(){ const name=document.getElementById('hostName').value.trim(); if(!name) return; myName=name; isHost=true; roomId=randomId(); startApp(); }
function joinRoom(){ const name=document.getElementById('joinName').value.trim(); const code=document.getElementById('joinCode').value.trim().toUpperCase(); if(!name||!code) return; myName=name; isHost=false; roomId=code; startApp(); }

// ── APP ──
function startApp(){
  document.getElementById('lobby').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('roomCodeDisplay').textContent=roomId;
  if(isHost){ document.getElementById('uploadZone').style.display='flex'; }
  else { document.getElementById('waitingScreen').style.display='flex'; }
  connectWS();
}

// ── WEBSOCKET ──
function connectWS(){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}`);
  myClientId=randomId(8);

  ws.onopen=()=>{
    ws.send(JSON.stringify({type:'join',roomId,isHost,clientId:myClientId}));
    addSystemMsg(`Вошёл как ${myName}${isHost?' (хост)':''}`);
  };

  ws.onmessage=async(e)=>{
    const msg=JSON.parse(e.data);

    if(msg.type==='init'){
      document.getElementById('viewersCount').textContent=`👁 ${msg.viewers}`;
      if(msg.hasVideo && !isHost){
        document.getElementById('waitingText').textContent='Подключение к хосту…';
      }
    }

    if(msg.type==='viewers'){
      document.getElementById('viewersCount').textContent=`👁 ${msg.count}`;
    }

    if(msg.type==='video_ready' && !isHost){
      document.getElementById('waitingText').textContent='Получение видео…';
      showP2PStatus('Установка P2P соединения…');
    }

    if(msg.type==='host_left'){
      addSystemMsg('Хост покинул комнату');
    }

    // ── WebRTC: host creates offer for each viewer ──
    if(msg.type==='peer_request' && isHost){
      await createPeerAsHost(msg.clientId);
    }

    if(msg.type==='offer' && !isHost){
      await handleOfferAsViewer(msg.offer);
    }

    if(msg.type==='answer' && isHost){
      const pc=peers.get(msg.clientId);
      if(pc) await pc.setRemoteDescription(new RTCSessionDescription(msg.answer));
    }

    if(msg.type==='ice'){
      const pc=isHost?peers.get(msg.clientId):peers.get('host');
      if(pc && msg.candidate){
        try{ await pc.addIceCandidate(new RTCIceCandidate(msg.candidate)); } catch(e){}
      }
    }

    if(msg.type==='sync' && !isHost){
      const video=document.getElementById('videoPlayer');
      if(!video.src) return;
      isSyncing=true;
      if(Math.abs(video.currentTime-msg.time)>0.8) video.currentTime=msg.time;
      if(msg.playing && video.paused) video.play();
      if(!msg.playing && !video.paused) video.pause();
      updatePlayBtn(msg.playing);
      setTimeout(()=>isSyncing=false,300);
    }

    if(msg.type==='chat'){ addMsg(msg.name,msg.text); }
  };

  ws.onclose=()=>addSystemMsg('Соединение прервано');
}

// ── WebRTC HOST SIDE ──
async function createPeerAsHost(clientId){
  if(!localFile){ console.warn('No local file'); return; }

  const pc=new RTCPeerConnection({iceServers:ICE_SERVERS});
  peers.set(clientId,pc);

  // Stream local file as MediaSource
  const stream=await getFileStream();
  stream.getTracks().forEach(track=>pc.addTrack(track,stream));

  pc.onicecandidate=({candidate})=>{
    if(candidate) ws.send(JSON.stringify({type:'ice',candidate,targetId:clientId,toHost:false}));
  };

  pc.onconnectionstatechange=()=>{
    if(pc.connectionState==='connected') addSystemMsg(`Зритель подключён (P2P)`);
  };

  const offer=await pc.createOffer();
  await pc.setLocalDescription(offer);
  ws.send(JSON.stringify({type:'offer',offer:pc.localDescription,targetId:clientId}));
}

// ── WebRTC VIEWER SIDE ──
async function handleOfferAsViewer(offer){
  const pc=new RTCPeerConnection({iceServers:ICE_SERVERS});
  peers.set('host',pc);

  pc.onicecandidate=({candidate})=>{
    if(candidate) ws.send(JSON.stringify({type:'ice',candidate,toHost:true}));
  };

  pc.ontrack=({streams})=>{
    const video=document.getElementById('videoPlayer');
    video.srcObject=streams[0];
    showVideoPlayer();
    showP2PStatus('P2P подключено ✓');
    setTimeout(()=>hideP2PStatus(),3000);
    addSystemMsg('Видео получено напрямую от хоста!');
  };

  pc.onconnectionstatechange=()=>{
    if(pc.connectionState==='failed'){
      showP2PStatus('P2P не удалось, попробуй перезайти');
    }
  };

  await pc.setRemoteDescription(new RTCSessionDescription(offer));
  const answer=await pc.createAnswer();
  await pc.setLocalDescription(answer);
  ws.send(JSON.stringify({type:'answer',answer:pc.localDescription}));
}

// ── FILE → STREAM ──
async function getFileStream(){
  // Use captureStream on a hidden video element
  const hiddenVideo=document.getElementById('videoPlayer');
  // Already loaded via loadLocalFile
  if(hiddenVideo.captureStream) return hiddenVideo.captureStream();
  if(hiddenVideo.mozCaptureStream) return hiddenVideo.mozCaptureStream();
  throw new Error('captureStream not supported');
}

// ── SELECT VIDEO (HOST) ──
function selectVideo(input){
  const file=input.files[0];
  if(!file) return;
  localFile=file;

  const url=URL.createObjectURL(file);
  const video=document.getElementById('videoPlayer');
  video.src=url;

  video.addEventListener('loadedmetadata',()=>{
    showVideoPlayer();
    // Notify server
    ws.send(JSON.stringify({type:'video_ready'}));
    addSystemMsg('Видео выбрано — друзья получат его напрямую');
  },{once:true});

  setupVideoEvents();
}

function showVideoPlayer(){
  document.getElementById('videoPlayer').style.display='block';
  document.getElementById('uploadZone').style.display='none';
  document.getElementById('waitingScreen').style.display='none';
  document.getElementById('controls').style.display='flex';
}

function setupVideoEvents(){
  const video=document.getElementById('videoPlayer');
  video.addEventListener('timeupdate',()=>{
    const bar=document.getElementById('progressBar');
    const label=document.getElementById('timeLabel');
    if(video.duration){
      bar.value=(video.currentTime/video.duration)*100;
      label.textContent=`${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
    }
    if(isHost && !isSyncing){
      ws.send(JSON.stringify({type:'sync',playing:!video.paused,time:video.currentTime}));
    }
  });
  video.addEventListener('play',()=>{ updatePlayBtn(true); syncIfHost(); });
  video.addEventListener('pause',()=>{ updatePlayBtn(false); syncIfHost(); });
}

function syncIfHost(){
  if(!isHost||isSyncing) return;
  const v=document.getElementById('videoPlayer');
  ws.send(JSON.stringify({type:'sync',playing:!v.paused,time:v.currentTime}));
}

function updatePlayBtn(playing){ document.getElementById('playPauseBtn').textContent=playing?'⏸':'▶'; }
function togglePlay(){ const v=document.getElementById('videoPlayer'); if(!v.src&&!v.srcObject) return; v.paused?v.play():v.pause(); }
function seekVideo(val){ const v=document.getElementById('videoPlayer'); if(!v.duration) return; v.currentTime=(val/100)*v.duration; syncIfHost(); }
function setVolume(val){ document.getElementById('videoPlayer').volume=val; }

// ── P2P STATUS ──
function showP2PStatus(text){
  const el=document.getElementById('p2pStatus');
  document.getElementById('p2pStatusText').textContent=text;
  el.classList.add('show');
}
function hideP2PStatus(){ document.getElementById('p2pStatus').classList.remove('show'); }

// ── CHAT ──
function addMsg(author,text){
  const msgs=document.getElementById('messages');
  const div=document.createElement('div');
  div.className='msg';
  div.innerHTML=`<div class="msg-author">${escHtml(author)}</div><div class="msg-text">${escHtml(text)}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}
function addSystemMsg(text){
  const msgs=document.getElementById('messages');
  const div=document.createElement('div');
  div.className='msg msg-system';
  div.innerHTML=`<div class="msg-text">${escHtml(text)}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}
function sendChat(){
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text||!ws) return;
  ws.send(JSON.stringify({type:'chat',name:myName,text}));
  input.value='';
}

// ── SHARE ──
function openShare(){
  document.getElementById('shareLink').value=`${location.origin}?room=${roomId}`;
  document.getElementById('shareCode').textContent=roomId;
  document.getElementById('shareModal').classList.add('open');
}
function closeShare(){ document.getElementById('shareModal').classList.remove('open'); }
function copyLink(){
  navigator.clipboard.writeText(document.getElementById('shareLink').value);
  const btn=document.querySelector('.copy-btn');
  btn.textContent='✓ Скопировано';
  setTimeout(()=>btn.textContent='Копировать',2000);
}
</script>
